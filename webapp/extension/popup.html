<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Laminar.AI Recorder</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        width: 320px;
        background: linear-gradient(180deg, #f6efe6 0%, #ece3d6 100%);
        color: #12232c;
      }

      main {
        padding: 16px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 20px;
      }

      p {
        margin: 0;
        font-size: 13px;
        line-height: 1.5;
        color: rgba(18, 35, 44, 0.74);
      }

      .panel {
        margin-top: 14px;
        padding: 14px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }

      .status {
        font-size: 12px;
        font-weight: 600;
        color: #0f3d3e;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        margin-top: 10px;
      }

      .stat {
        border-radius: 14px;
        background: rgba(15, 61, 62, 0.08);
        padding: 10px;
      }

      .stat-label {
        font-size: 11px;
        color: rgba(18, 35, 44, 0.66);
      }

      .stat-value {
        margin-top: 4px;
        font-size: 18px;
        font-weight: 700;
      }

      .actions {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 14px;
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .primary {
        background: #0f3d3e;
        color: white;
      }

      .secondary {
        background: white;
        color: #12232c;
        border: 1px solid rgba(148, 163, 184, 0.45);
      }

      .warning {
        background: #c96f3b;
        color: white;
      }

      .note {
        margin-top: 12px;
        font-size: 11px;
        color: rgba(18, 35, 44, 0.6);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Laminar.AI Recorder</h1>
      <p>Capture tab behavior and moments the student does not understand.</p>

      <section class="panel">
        <div class="status" id="status">Status: checking recorder</div>
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Run ID</div>
            <div class="stat-value" id="studyRunId">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">Tab spans</div>
            <div class="stat-value" id="tabSpans">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Confusions</div>
            <div class="stat-value" id="confusionCaptures">0</div>
          </div>
        </div>
        <div class="actions">
          <button class="primary" id="start" type="button">Start Recording</button>
          <button class="secondary" id="stop" type="button">Stop Recording</button>
          <button class="warning" id="confusion" type="button">Do Not Understand</button>
          <button class="secondary" id="export" type="button">Export JSON</button>
        </div>
        <div class="note">
          Use “Do Not Understand” whenever the student gets stuck. The current screen is captured
          and imported into the website later.
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
